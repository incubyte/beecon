    dependencies: []
  get-target-folder:
    type: api-request-to-external-app
    name: Get Target Folder
    description: Resolve configured folder (well-known name or ID) to a canonical folder ID
    config:
      request:
        path: /me/mailFolders/{folderId}
        method: GET
        pathParameters:
          folderId:
            $firstNotEmpty:
              - $var: $.flowInstance.parameters.folderId
              - Inbox
      responseSchema:
        type: object
        properties:
          id:
            type: string
    outputSchema:
      type: object
      properties:
        status:
          type: number
        data:
          type: object
          properties:
            id:
              type: string
      title: Get Target Folder
    links:
      - key: transform-message
        filter:
          $eval:
            $var: $.input.find-by-id-message.fields.parentFolderId
          is:
            $var: $.output.data.id
    dependencies: []
  transform-message:
    type: transform-data
    name: Extract Message Data
    description: Extract message ID and event type for webhook payload
    config:
      output:
        id:
          $var: $.input.find-by-id-message.fields.id
        event_type:
          $plain: message_received
    outputSchema:
      type: object
      properties:
        id:
          type: string
        event_type:
          type: string
      title: Extract Message Data
    links:
      - key: send-to-api
    dependencies: []
  send-to-api:
    type: api-request-to-your-app
    name: Send to Your API
    description: Send the message event to your API endpoint
    config:
      request:
        uri: /api/flows/webhook
        method: POST
        body:
          data:
            trigger_id:
              $var: $.flowInstance.id
            id:
              $var: $.input.transform-message.id
            event_type:
              $var: $.input.transform-message.event_type
    outputSchema:
      type: object
      properties:
        response:
          type: object
          properties:
            status:
              type: integer
            data: {}
      title: Send to Your API
    links: []
    dependencies: []
