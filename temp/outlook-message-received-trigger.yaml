key: outlook-message-trigger
name: New Outlook Message
description: Triggered when a new message is received in the Outlook mailbox.
isCustomized: true
parametersSchema:
  type: object
  properties:
    folderId:
      title: Folder ID
      description: >-
        Outlook folder identifier to monitor (well-known folder name like
        Inbox/SentItems or a folder ID). Defaults to Inbox.
      type: string
      default: Inbox
