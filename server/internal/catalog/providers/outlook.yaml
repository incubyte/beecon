# Outlook provider definition, finalized format v1 (PD13). This is the
# locally defined declarative source of truth for the Outlook provider until
# the Phase 5 registry service exists.
formatVersion: 1
slug: outlook
name: Outlook
logo: https://static.beecon.dev/providers/outlook.png
authScheme: oauth2
oauth:
  authorizeUrl: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
  tokenUrl: https://login.microsoftonline.com/common/oauth2/v2.0/token
  # User.Read lets the OAuth callback fetch this endpoint (bearer-
  # authenticated) to capture account metadata (email/display name) for the
  # Connection (PD9).
  userInfoUrl: https://graph.microsoft.com/v1.0/me
  # offline_access yields the refresh token Beecon must store; User.Read lets
  # the OAuth callback capture account metadata (email/display name) for the
  # Connection (PD9).
  scopes:
    - offline_access
    - Mail.Read
    - User.Read
mapping:
  baseUrl: https://graph.microsoft.com/v1.0
tools:
  - slug: outlook-list-messages
    name: List messages
    description: List messages in the authenticated user's mailbox.
    inputSchema:
      type: object
      properties:
        top:
          type: integer
          description: Maximum number of messages to return.
        skip:
          type: integer
          description: Number of messages to skip, for pagination.
        select:
          type: string
          description: Comma-separated list of fields to include in the response.
        filter:
          type: string
          description: An OData filter expression restricting which messages are returned.
    outputSchema:
      type: object
      properties:
        value:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              subject:
                type: string
    mapping:
      method: GET
      path: /me/messages
      query:
        top: "{input.top}"
        skip: "{input.skip}"
        select: "{input.select}"
        filter: "{input.filter}"

  - slug: outlook-get-message
    name: Get email message
    description: >-
      Retrieves a specific email message by its ID from the authenticated
      user's Outlook mailbox. Use the 'select' input to include specific
      fields like 'internetMessageHeaders' for filtering automated emails.
    inputSchema:
      type: object
      properties:
        messageId:
          title: Message ID
          description: The unique identifier of the email message to retrieve.
          type: string
        select:
          title: Select Fields
          description: >-
            Comma-separated list of fields to include in the response (e.g.
            'subject,from,receivedDateTime,internetMessageHeaders').
          type: string
      required:
        - messageId
    outputSchema:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        bodyPreview:
          type: string
        body:
          type: object
          properties:
            contentType:
              type: string
            content:
              type: string
        from:
          type: object
          properties:
            emailAddress:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
        toRecipients:
          type: array
          items:
            type: object
            properties:
              emailAddress:
                type: object
                properties:
                  name:
                    type: string
                  address:
                    type: string
        receivedDateTime:
          type: string
        sentDateTime:
          type: string
        hasAttachments:
          type: boolean
        internetMessageId:
          type: string
        importance:
          type: string
        isRead:
          type: boolean
        isDraft:
          type: boolean
        conversationId:
          type: string
    mapping:
      method: GET
      # Mirrors temp/outlook-get-message.yaml's default case (the
      # authenticated user's own mailbox, "/me/..."); the finalized format's
      # mapping has no conditional path routing, so the userId-scoped
      # variant (/users/{userId}/messages/{messageId}) is not expressed here.
      path: /me/messages/{input.messageId}
      query:
        $select: "{input.select}"
